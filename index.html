<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DLS AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(117, 153, 255, 0.28), transparent 22%),
        radial-gradient(circle at 85% 15%, rgba(202, 126, 255, 0.25), transparent 24%),
        radial-gradient(circle at 80% 85%, rgba(79, 196, 255, 0.18), transparent 20%),
        linear-gradient(135deg, #0f172a 0%, #1e1b4b 48%, #5b21b6 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: auto;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.5;
      pointer-events: none;
    }

    body::before {
      background: rgba(99, 102, 241, 0.25);
      top: -90px;
      left: -80px;
    }

    body::after {
      background: rgba(168, 85, 247, 0.22);
      right: -100px;
      bottom: -90px;
    }

    .container {
      width: 100%;
      max-width: 980px;
      height: 94vh;
      max-height: 980px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.26);
      border-radius: 30px;
      box-shadow: 0 30px 100px rgba(9, 13, 31, 0.4);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #d946ef 100%);
      color: white;
      padding: 20px 20px 18px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.16), transparent 40%, rgba(255,255,255,0.06));
      pointer-events: none;
    }

    .header h1 {
      font-family: 'Space Grotesk', 'DM Sans', sans-serif;
      font-size: 28px;
      margin-bottom: 4px;
      letter-spacing: 0.4px;
    }

    .header p {
      font-size: 13px;
      opacity: 0.92;
    }

    .chat-display {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding: 18px 18px 12px;
      background:
        radial-gradient(circle at top right, rgba(99,102,241,0.06), transparent 26%),
        linear-gradient(180deg, rgba(248,249,255,0.98), rgba(242,245,255,0.98));
    }

    .message {
      margin-bottom: 15px;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      text-align: right;
    }

    .message.ai {
      text-align: left;
    }

    .message-content {
      display: inline-block;
      max-width: 70%;
      padding: 13px 16px;
      border-radius: 18px;
      word-wrap: break-word;
      line-height: 1.55;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #7c6df2 100%);
      color: white;
      border-radius: 18px 18px 6px 18px;
      box-shadow: 0 14px 28px rgba(102, 126, 234, 0.26);
    }

    .message.ai .message-content {
      background: rgba(255, 255, 255, 0.96);
      color: #2a3142;
      border: 1px solid rgba(102, 126, 234, 0.1);
      border-radius: 18px 18px 18px 6px;
      box-shadow: 0 12px 24px rgba(21, 28, 68, 0.08);
    }

    .message-label {
      font-size: 11px;
      color: #7a7f9a;
      margin-bottom: 6px;
      padding: 0 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .input-area {
      padding: 16px 18px 18px;
      background: rgba(255, 255, 255, 0.98);
      border-top: 1px solid rgba(148, 158, 199, 0.16);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-field {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid #d7dbef;
      border-radius: 999px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
      background: white;
    }

    .input-field:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
    }

    .send-btn {
      padding: 14px 26px;
      background: linear-gradient(135deg, #667eea 0%, #7e63d7 100%);
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 24px rgba(102, 126, 234, 0.24);
    }

    .send-btn:hover {
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: scale(1);
    }

    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(102, 126, 234, 0.12);
      border-radius: 18px 18px 18px 6px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      animation: bounce 1.4s infinite;
    }

    .typing-indicator span:nth-child(1) {
      animation-delay: 0s;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 60%, 100% {
        transform: translateY(0);
      }
      30% {
        transform: translateY(-10px);
      }
    }

    .context-selector {
      padding: 10px 18px 12px;
      background: linear-gradient(180deg, rgba(247,248,255,0.98), rgba(243,245,252,0.98));
      border-bottom: 1px solid rgba(148, 158, 199, 0.18);
      display: flex;
      gap: 10px;
      font-size: 12px;
      flex-wrap: wrap;
    }

    .context-selector label {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .context-selector select {
      padding: 8px 10px;
      border: 1px solid #d7dbef;
      border-radius: 12px;
      font-size: 12px;
      background: white;
    }

    .profile-panel {
      padding: 14px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,251,255,0.98));
      border-bottom: 1px solid rgba(148, 158, 199, 0.16);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }

    .field-group input,
    .field-group select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #d7dbef;
      border-radius: 14px;
      font-size: 13px;
      outline: none;
      background: white;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-group input:focus,
    .field-group select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
    }

    .profile-actions {
      display: flex;
      gap: 10px;
      grid-column: 1 / -1;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .profile-btn {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 13px;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea 0%, #7e63d7 100%);
      color: white;
      font-weight: 600;
      box-shadow: 0 10px 24px rgba(102, 126, 234, 0.18);
    }

    .profile-btn.secondary {
      background: #eef1fb;
      color: #333;
    }

    .suggestions {
      padding: 10px 18px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,250,255,0.96));
      border-bottom: 1px solid rgba(148, 158, 199, 0.16);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .suggestions-title {
      font-size: 12px;
      color: #5d6380;
      font-weight: 600;
      margin-right: 4px;
    }

    .suggestion-select-wrap {
      position: relative;
      min-width: 280px;
      flex: 1;
      max-width: 100%;
    }

    .suggestion-select {
      width: 100%;
      border: 1px solid #d7dbef;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      background: white;
      color: #2c3142;
      appearance: none;
      outline: none;
      box-shadow: 0 8px 18px rgba(21, 28, 68, 0.06);
    }

    .suggestion-select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
    }

    .suggestion-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #667eea;
      pointer-events: none;
    }

    .profile-note {
      grid-column: 1 / -1;
      font-size: 12px;
      color: #5d6380;
      line-height: 1.45;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 720px) {
      .profile-panel {
        grid-template-columns: 1fr;
      }

      .suggestion-select-wrap {
        min-width: 100%;
      }

      .input-area {
        flex-direction: column;
      }

      .send-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>DLS AI Chatbot</h1>
      <p>Digital Logics Studio Learning Assistant</p>
    </div>

    <div class="profile-panel">
      <div class="field-group">
        <label for="nameInput">Your name</label>
        <input type="text" id="nameInput" placeholder="e.g., Ahmed">
      </div>
      <div class="field-group">
        <label for="learnerLevel">How much do you know?</label>
        <select id="learnerLevel">
          <option value="">I'm not sure yet</option>
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
      </div>
      <div class="field-group">
        <label for="goalInput">What do you want to learn?</label>
        <input type="text" id="goalInput" placeholder="e.g., flip-flops, K-maps, assembly">
      </div>
      <div class="profile-actions">
        <button class="profile-btn" id="saveProfileBtn">Start chatting</button>
        <button class="profile-btn secondary" id="resetProfileBtn">Reset</button>
      </div>
      <div class="profile-note" id="profileNote">
        Tip: if you're not sure about your level, choose "I'm not sure yet" and the chatbot will ask a short diagnostic question and learn as you go.
      </div>
    </div>

    <div class="context-selector">
      <label>
        Course:
        <select id="courseSelect">
          <option value="DLS">Digital Logic Design (DLS)</option>
          <option value="COAL">Computer Organization & Assembly Language (COAL)</option>
        </select>
      </label>
      <label>
        Topic:
        <input type="text" id="topicInput" placeholder="e.g., sequential-circuits" style="padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; width: 150px;">
      </label>
    </div>

    <div class="suggestions">
      <div class="suggestions-title">Suggested topics:</div>
      <div class="suggestion-select-wrap">
        <select id="topicSuggestionSelect" class="suggestion-select">
          <option value="">Pick a topic to jump in</option>
          <option value="Boolean Algebra">Boolean Algebra</option>
          <option value="Number Systems">Number Systems</option>
          <option value="Flip-Flops">Flip-Flops</option>
          <option value="Counters">Counters</option>
          <option value="K-Maps">K-Maps</option>
          <option value="Assembly Basics">Assembly Basics</option>
          <option value="Registers">Registers</option>
          <option value="Addressing Modes">Addressing Modes</option>
        </select>
      </div>
    </div>

    <div class="chat-display" id="chatDisplay"></div>

    <div class="input-area">
      <input 
        type="text" 
        class="input-field" 
        id="messageInput" 
        placeholder="Ask me anything about digital logic..."
        autocomplete="off"
      >
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const chatDisplay = document.getElementById('chatDisplay');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const courseSelect = document.getElementById('courseSelect');
    const topicInput = document.getElementById('topicInput');
    const nameInput = document.getElementById('nameInput');
    const learnerLevel = document.getElementById('learnerLevel');
    const goalInput = document.getElementById('goalInput');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const resetProfileBtn = document.getElementById('resetProfileBtn');
    const profileNote = document.getElementById('profileNote');
    const topicSuggestionSelect = document.getElementById('topicSuggestionSelect');

    let isWaiting = false;
    let userProfile = loadProfile();

    function loadProfile() {
      try {
        return JSON.parse(localStorage.getItem('dlsProfile')) || {};
      } catch {
        return {};
      }
    }

    function saveProfile(profile) {
      userProfile = profile;
      localStorage.setItem('dlsProfile', JSON.stringify(profile));
    }

    function applyProfile() {
      if (userProfile.name) nameInput.value = userProfile.name;
      if (userProfile.level) learnerLevel.value = userProfile.level;
      if (userProfile.goal) goalInput.value = userProfile.goal;
      if (userProfile.course) courseSelect.value = userProfile.course;
      if (userProfile.topic) topicInput.value = userProfile.topic;
    }

    function profileComplete() {
      return nameInput.value.trim().length > 0;
    }

    // Add welcome message
    function addWelcomeMessage() {
      const message = document.createElement('div');
      message.className = 'message ai';
      message.innerHTML = `
        <div class="message-label">DLS Mentor</div>
        <div class="message-content">
          Welcome! I'm your Digital Logics Studio learning assistant. Start by telling me your name and how much you already know. If you're unsure, that’s fine - I’ll figure it out from your answers and keep adjusting as we chat. You can also jump into a topic with the dropdown above.
        </div>
      `;
      chatDisplay.appendChild(message);
      chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    function addProfileReminder() {
      const message = document.createElement('div');
      message.className = 'message ai';
      message.innerHTML = `
        <div class="message-label">DLS Mentor</div>
        <div class="message-content">
          Tell me your name so I can address you properly, and pick a level if you know it. If not, I’ll learn from your answers as we go.
        </div>
      `;
      chatDisplay.appendChild(message);
      chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    // Add user message
    function addUserMessage(text) {
      const message = document.createElement('div');
      message.className = 'message user';
      message.innerHTML = `
        <div class="message-label">You</div>
        <div class="message-content">${escapeHtml(text)}</div>
      `;
      chatDisplay.appendChild(message);
      chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    // Add AI message with streaming
    function addAIMessage(streamData) {
      const message = document.createElement('div');
      message.className = 'message ai';
      message.innerHTML = `
        <div class="message-label">DLS Mentor</div>
        <div class="message-content" id="aiResponse"></div>
      `;
      chatDisplay.appendChild(message);

      const responseDiv = document.getElementById('aiResponse');
      let fullText = '';

      for (const chunk of streamData) {
        fullText += chunk;
        responseDiv.textContent = fullText;
      }

      chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    // Show typing indicator
    function showTypingIndicator() {
      const message = document.createElement('div');
      message.className = 'message ai';
      message.id = 'typingIndicator';
      message.innerHTML = `
        <div class="message-label">DLS Mentor</div>
        <div class="typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;
      chatDisplay.appendChild(message);
      chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    // Remove typing indicator
    function removeTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    }

    // Send message
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || isWaiting) return;

      if (!profileComplete()) {
        profileNote.textContent = 'Please enter your name first so I can address you properly.';
        nameInput.focus();
        addProfileReminder();
        return;
      }

      isWaiting = true;
      sendBtn.disabled = true;

      saveProfile({
        name: nameInput.value.trim(),
        level: learnerLevel.value,
        goal: goalInput.value.trim(),
        course: courseSelect.value,
        topic: topicInput.value.trim()
      });

      addUserMessage(message);
      messageInput.value = '';

      showTypingIndicator();

      const context = {
        name: nameInput.value.trim(),
        currentCourse: courseSelect.value,
        currentTopic: topicInput.value || 'general',
        learnerLevel: learnerLevel.value || 'unknown',
        goal: goalInput.value.trim() || 'general learning'
      };

      try {
        const response = await fetch('http://localhost:5100/api/ai/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, context })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        removeTypingIndicator();
        const responseId = 'aiResponse-' + Date.now();
        const message_content = document.createElement('div');
        message_content.className = 'message ai';
        message_content.innerHTML = `
          <div class="message-label">DLS Mentor</div>
          <div class="message-content" id="${responseId}"></div>
        `;
        chatDisplay.appendChild(message_content);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const jsonStr = line.slice(6);
              try {
                const data = JSON.parse(jsonStr);
                if (data.token) {
                  fullText += data.token;
                  document.getElementById(responseId).textContent = fullText;
                  chatDisplay.scrollTop = chatDisplay.scrollHeight;
                }
              } catch (e) {
                // Ignore parse errors
              }
            }
          }
        }

        isWaiting = false;
        sendBtn.disabled = false;
        messageInput.focus();
      } catch (error) {
        console.error('Error:', error);
        removeTypingIndicator();
        const message = document.createElement('div');
        message.className = 'message ai';
        message.innerHTML = `
          <div class="message-label">Error</div>
          <div class="message-content">Sorry, something went wrong. Please try again. Check the console for details.</div>
        `;
        chatDisplay.appendChild(message);
        isWaiting = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    saveProfileBtn.addEventListener('click', () => {
      if (!nameInput.value.trim()) {
        profileNote.textContent = 'Please enter your name first.';
        nameInput.focus();
        return;
      }

      saveProfile({
        name: nameInput.value.trim(),
        level: learnerLevel.value,
        goal: goalInput.value.trim(),
        course: courseSelect.value,
        topic: topicInput.value.trim()
      });

      profileNote.textContent = `Hi ${nameInput.value.trim()}! Start asking questions. If your level is unknown, I’ll figure it out as we go.`;
      messageInput.focus();
    });

    resetProfileBtn.addEventListener('click', () => {
      localStorage.removeItem('dlsProfile');
      userProfile = {};
      nameInput.value = '';
      learnerLevel.value = '';
      goalInput.value = '';
      topicInput.value = '';
      courseSelect.value = 'DLS';
      profileNote.textContent = 'Tip: if you are not sure about your level, choose "I\'m not sure yet" and the chatbot will ask a short diagnostic question and learn as you go.';
      messageInput.focus();
    });

    topicSuggestionSelect.addEventListener('change', () => {
      const topic = topicSuggestionSelect.value;
      if (!topic) return;

      topicInput.value = topic;
      goalInput.value = topic;
      messageInput.value = `Teach me about ${topic}`;
      messageInput.focus();
    });

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Initialize
    applyProfile();
    addWelcomeMessage();
    if (!profileComplete()) {
      addProfileReminder();
    } else {
      profileNote.textContent = `Welcome back, ${nameInput.value.trim()}. Pick a topic suggestion or start asking directly.`;
    }
    messageInput.focus();

    // Escape HTML
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, (m) => map[m]);
    }
  </script>
</body>
</html>
