<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DLS AI Chatbot — Local Test UI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --accent:    #6c63ff;
      --accent-dk: #574fd6;
      --text:      #e2e4f0;
      --muted:     #8b8fa8;
      --user-bg:   #6c63ff22;
      --bot-bg:    #1e2130;
      --danger:    #ff5c6e;
      --radius:    12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 800px;
      padding: 18px 24px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    header .logo {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.78rem; color: var(--muted); }

    .badge {
      margin-left: auto;
      font-size: 0.7rem;
      padding: 3px 9px;
      border-radius: 20px;
      background: #6c63ff33;
      color: var(--accent);
      border: 1px solid #6c63ff55;
    }

    /* ── Onboarding form ── */
    #onboarding {
      width: 100%;
      max-width: 480px;
      margin: auto;
      padding: 32px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #onboarding h2 { font-size: 1.15rem; text-align: center; }
    #onboarding p  { font-size: 0.82rem; color: var(--muted); text-align: center; }

    label { font-size: 0.83rem; color: var(--muted); display: block; margin-bottom: 4px; }

    input, select {
      width: 100%;
      padding: 10px 13px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--bg); }

    button.primary {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button.primary:hover { background: var(--accent-dk); }

    /* ── Chat UI ── */
    #chat-ui {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 800px;
      flex: 1;
      min-height: 0;
    }

    /* Context bar */
    #context-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    #context-bar span {
      font-size: 0.75rem;
      color: var(--muted);
    }

    #context-bar select {
      width: auto;
      padding: 4px 8px;
      font-size: 0.78rem;
      border-radius: 6px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .avatar { background: var(--accent); }
    .msg.bot  .avatar { background: #2e3148; }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble { background: var(--user-bg); border: 1px solid #6c63ff44; border-top-right-radius: 3px; }
    .msg.bot  .bubble { background: var(--bot-bg);  border: 1px solid var(--border); border-top-left-radius: 3px; }

    .msg.error .bubble { border-color: var(--danger); color: var(--danger); }

    /* Typing indicator */
    .typing-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      margin: 0 2px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s;  }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Input row */
    #input-row {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }

    #user-input {
      flex: 1;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color .2s;
      font-family: inherit;
    }
    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background .2s;
    }
    #send-btn:hover   { background: var(--accent-dk); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* Streaming cursor */
    .cursor::after {
      content: '▋';
      animation: blink .7s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Token counter */
    #token-info {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: right;
      padding: 0 20px 6px;
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">🧠</div>
  <div>
    <h1>DLS Mentor</h1>
    <p>Digital Logics Studio — AI Teaching Assistant</p>
  </div>
  <span class="badge" id="model-badge">llama-3.3-70b</span>
</header>

<!-- ── ONBOARDING ── -->
<div id="onboarding">
  <h2>👋 Welcome to DLS Mentor</h2>
  <p>Let's personalise your experience before we start.</p>

  <div>
    <label for="ob-name">Your name</label>
    <input id="ob-name" type="text" placeholder="e.g. Ali" autocomplete="off" />
  </div>

  <div>
    <label for="ob-level">Your current level</label>
    <select id="ob-level">
      <option value="beginner">Beginner — new to digital logic</option>
      <option value="intermediate" selected>Intermediate — know the basics</option>
      <option value="advanced">Advanced — comfortable with circuits</option>
    </select>
  </div>

  <div>
    <label for="ob-topic">Starting topic</label>
    <select id="ob-topic">
      <option value="boolean-algebra">Boolean Algebra</option>
      <option value="number-systems">Number Systems</option>
      <option value="arithmetic-circuits">Arithmetic Circuits</option>
      <option value="memory">Memory (Latches & Flip-flops)</option>
      <option value="sequential-circuits">Sequential Circuits</option>
    </select>
  </div>

  <button class="primary" id="start-btn">Start chatting →</button>
</div>

<!-- ── CHAT UI ── -->
<div id="chat-ui">
  <div id="context-bar">
    <span>Topic:</span>
    <select id="topic-select">
      <option value="boolean-algebra">Boolean Algebra</option>
      <option value="number-systems">Number Systems</option>
      <option value="arithmetic-circuits">Arithmetic Circuits</option>
      <option value="memory">Memory</option>
      <option value="sequential-circuits">Sequential Circuits</option>
    </select>
    <span style="margin-left:8px">Level:</span>
    <select id="level-select">
      <option value="beginner">Beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
  </div>

  <div id="messages"></div>
  <div id="token-info"></div>

  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask a question about digital logic…"></textarea>
    <button id="send-btn" title="Send (Enter)">➤</button>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  const API_BASE   = 'http://localhost:5100/api/ai';
  const recentTopics = [];
  let userName     = '';
  let streaming    = false;

  // ── DOM refs ───────────────────────────────────────────────────────────
  const onboarding   = document.getElementById('onboarding');
  const chatUI       = document.getElementById('chat-ui');
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const topicSelect  = document.getElementById('topic-select');
  const levelSelect  = document.getElementById('level-select');
  const tokenInfo    = document.getElementById('token-info');

  // ── Onboarding ─────────────────────────────────────────────────────────
  document.getElementById('start-btn').addEventListener('click', () => {
    const name  = document.getElementById('ob-name').value.trim() || 'Learner';
    const level = document.getElementById('ob-level').value;
    const topic = document.getElementById('ob-topic').value;

    userName = name;
    topicSelect.value = topic;
    levelSelect.value = level;

    onboarding.style.display = 'none';
    chatUI.style.display = 'flex';

    addBotMessage(`Hi ${name}! 👋 I'm DLS Mentor. Ask me anything about **${formatTopic(topic)}** — I'm here to help.`);
    inputEl.focus();
  });

  // ── Send message ────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    const currentTopic = topicSelect.value;
    const difficulty   = levelSelect.value;

    // Track recent topics (last 3, no duplicates)
    if (!recentTopics.includes(currentTopic)) {
      recentTopics.unshift(currentTopic);
      if (recentTopics.length > 3) recentTopics.pop();
    }

    addUserMessage(text);
    inputEl.value = '';
    autoResize();
    tokenInfo.textContent = '';

    const typingId = addTypingIndicator();
    sendBtn.disabled = true;
    streaming = true;

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          context: {
            name: userName,
            currentTopic,
            recentTopics: [...recentTopics],
            difficulty,
            learnerLevel: difficulty,
          },
        }),
      });

      removeMessage(typingId);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
        addErrorMessage(err.error || `Request failed (${res.status})`);
        return;
      }

      const data = await res.json();
      addBotMessage(data.reply || 'No response received.');

      if (data.tokensUsed) {
        tokenInfo.textContent = `Tokens used: ${data.tokensUsed} · Model: ${data.model}`;
      }

    } catch (err) {
      removeMessage(typingId);
      addErrorMessage('Could not reach the server. Is it running on port 5100?');
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      streaming = false;
      scrollToBottom();
    }
  }

  // ── Message helpers ─────────────────────────────────────────────────────
  let msgCounter = 0;

  function addUserMessage(text) {
    const id = `msg-${++msgCounter}`;
    messagesEl.insertAdjacentHTML('beforeend', `
      <div class="msg user" id="${id}">
        <div class="avatar">👤</div>
        <div class="bubble">${escHtml(text)}</div>
      </div>`);
    scrollToBottom();
    return id;
  }

  function addBotMessage(text, streaming = false) {
    const id = `msg-${++msgCounter}`;
    messagesEl.insertAdjacentHTML('beforeend', `
      <div class="msg bot" id="${id}">
        <div class="avatar">🧠</div>
        <div class="bubble${streaming ? ' cursor' : ''}">${escHtml(text)}</div>
      </div>`);
    scrollToBottom();
    return id;
  }

  function updateBotMessage(id, text, isCursor = false, isError = false) {
    const el = document.querySelector(`#${id} .bubble`);
    if (!el) return;
    el.textContent = text;
    el.classList.toggle('cursor', isCursor);
    if (isError) el.style.color = 'var(--danger)';
  }

  function addTypingIndicator() {
    const id = `msg-${++msgCounter}`;
    messagesEl.insertAdjacentHTML('beforeend', `
      <div class="msg bot" id="${id}">
        <div class="avatar">🧠</div>
        <div class="bubble typing-dots"><span></span><span></span><span></span></div>
      </div>`);
    scrollToBottom();
    return id;
  }

  function addErrorMessage(text) {
    const id = `msg-${++msgCounter}`;
    messagesEl.insertAdjacentHTML('beforeend', `
      <div class="msg bot error" id="${id}">
        <div class="avatar">⚠️</div>
        <div class="bubble">${escHtml(text)}</div>
      </div>`);
    scrollToBottom();
  }

  function removeMessage(id) {
    document.getElementById(id)?.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTopic(slug) {
    return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  // ── Input auto-resize ──────────────────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  inputEl.addEventListener('input', autoResize);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
</script>
</body>
</html>
